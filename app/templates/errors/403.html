{% extends "base.html" %}

{% block title %}Access Denied - 403{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-75 align-items-center">
        <div class="col-lg-6 text-center">
            <div class="error-container">
                <!-- Error Icon -->
                <div class="error-icon mb-4">
                    <i class="bi bi-shield-exclamation" style="font-size: 6rem; color: #dc3545;"></i>
                </div>
                
                <!-- Error Code -->
                <h1 class="display-1 fw-bold text-danger mb-3">403</h1>
                
                <!-- Error Message -->
                <h2 class="h3 mb-3">Access Denied</h2>
                <p class="lead text-muted mb-4">
                    You don't have permission to access this resource.
                </p>
                
                <!-- Action Buttons -->
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="{{ url_for('main.home') }}" class="btn btn-danger btn-lg">
                        <i class="bi bi-house-door me-2"></i>Go Home
                    </a>
                    {% if not current_user.is_authenticated %}
                        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-danger btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
