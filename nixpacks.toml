[phases.setup]
nixPkgs = ["postgresql", "postgresql.lib", "python311"]

[phases.install]
cmds = [
  "python3.11 -m venv .venv",
  ". .venv/bin/activate && pip install --upgrade pip",
  ". .venv/bin/activate && pip install --no-cache-dir -r requirements.txt"
]

[phases.start]
cmd = ". .venv/bin/activate && gunicorn run:app"

[build.env]
LD_LIBRARY_PATH = "/nix/store/*postgresql-*/lib"